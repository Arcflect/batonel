name: Onboarding Init-Plan E2E

on:
  pull_request:
    paths:
      - "src/**"
      - "docs/**"
      - "examples/**"
      - "presets/**"
      - "scripts/onboarding_e2e_init_plan.sh"
      - ".github/workflows/onboarding-init-plan-e2e.yml"
  workflow_dispatch:

jobs:
  onboarding-e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: generic-layered
            project_name: e2e-generic-service
          - preset: rust-clean-hexagonal
            project_name: e2e-rust-service

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run onboarding e2e (init -> plan)
        run: |
          bash scripts/onboarding_e2e_init_plan.sh \
            --preset "${{ matrix.preset }}" \
            --project-name "${{ matrix.project_name }}"

      - name: Upload onboarding logs
        uses: actions/checkout@v7
        with:
          name: onboarding-e2e-${{ matrix.preset }}
          path: target/onboarding-e2e/${{ matrix.preset }}/*.log

name: Archflow Guard Sidecar CI

on:
  pull_request:
    paths:
      - "src/**"
      - "schemas/**"
      - "examples/**"
      - "presets/**"
      - "docs/**"
      - ".github/workflows/archflow-guard-sidecar.yml"
  workflow_dispatch:

jobs:
  guard-sidecar:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example_dir:
          - examples/minimal/archflow
          - examples/generic-layered/archflow
          - examples/rust-clean-hexagonal/archflow

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run archflow guard --hook ci --strict and save log (${{ matrix.example_dir }})
        working-directory: ${{ matrix.example_dir }}
        run: cargo run --manifest-path ../../../Cargo.toml -- guard --hook ci --strict 2>&1 | tee archflow-guard.log

      - name: Build artifact name suffix
        id: artifact_suffix
        run: echo "value=$(echo '${{ matrix.example_dir }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Upload guard log artifact
        uses: actions/checkout@v7
        with:
          name: archflow-guard-log-${{ steps.artifact_suffix.outputs.value }}
          path: ${{ matrix.example_dir }}/archflow-guard.log

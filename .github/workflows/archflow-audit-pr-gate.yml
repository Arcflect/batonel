name: Archflow Audit PR Gate

on:
  pull_request:
    paths:
      - "src/**"
      - "schemas/**"
      - "examples/**"
      - "presets/**"
      - "docs/**"
      - ".github/workflows/archflow-audit-pr-gate.yml"
  workflow_dispatch:

jobs:
  audit-examples:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example_dir:
          - examples/minimal/archflow
          - examples/generic-layered/archflow
          - examples/rust-clean-hexagonal/archflow

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run archflow audit --strict and save log (${{ matrix.example_dir }})
        working-directory: ${{ matrix.example_dir }}
        run: cargo run --manifest-path ../../../Cargo.toml -- audit --strict 2>&1 | tee archflow-audit.log

      - name: Build artifact name suffix
        id: artifact_suffix
        run: echo "value=$(echo '${{ matrix.example_dir }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Upload audit log artifact
        uses: actions/upload-artifact@v7
        with:
          name: archflow-audit-log-${{ steps.artifact_suffix.outputs.value }}
          path: ${{ matrix.example_dir }}/archflow-audit.log

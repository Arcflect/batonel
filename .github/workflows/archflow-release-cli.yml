name: Archflow Release CLI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: archflow
            archive_ext: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary_name: archflow
            archive_ext: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            binary_name: archflow
            archive_ext: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            binary_name: archflow
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release tag format
        shell: bash
        run: |
          TAG="${{ steps.release_tag.outputs.value }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG (expected vX.Y.Z)" >&2
            exit 1
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Smoke test
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          chmod +x "$BIN"

          # Verify that the binary version matches the release tag
          TAG="${{ steps.release_tag.outputs.value }}"
          EXPECTED_VERSION="${TAG#v}"
          BINARY_VERSION="$("$BIN" --version | awk '{print $2}')"
          if [[ "$BINARY_VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "Binary version mismatch: binary reports '${BINARY_VERSION}' but release tag is '${TAG}'" >&2
            exit 1
          fi

          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT
          pushd "$TMP_DIR" >/dev/null
          "$BIN" init --preset generic-layered --project-name release-smoke
          "$BIN" plan
          "$BIN" audit
          popd >/dev/null

      - name: Package archive
        shell: bash
        run: |
          TAG="${{ steps.release_tag.outputs.value }}"
          DIST_DIR="dist"
          mkdir -p "$DIST_DIR"
          ARCHIVE_NAME="archflow-${TAG}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          tar -czf "$DIST_DIR/$ARCHIVE_NAME" -C "target/${{ matrix.target }}/release" "${{ matrix.binary_name }}"

          (cd "$DIST_DIR" && sha256sum "$ARCHIVE_NAME" > "$ARCHIVE_NAME.sha256")

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: archflow-release-${{ matrix.target }}
          path: dist/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p dist/release-assets
          find dist -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -exec cp {} dist/release-assets/ \;

      - name: Build combined checksums file
        shell: bash
        run: |
          pushd dist/release-assets >/dev/null
          cat *.sha256 > checksums.txt
          popd >/dev/null

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.value }}
          name: Archflow ${{ steps.release_tag.outputs.value }}
          draft: false
          files: |
            dist/release-assets/*.tar.gz
            dist/release-assets/*.sha256
            dist/release-assets/checksums.txt

name: Archflow Release CLI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: archflow
            archive_ext: tar.gz
            smoke_test: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: archflow
            archive_ext: tar.gz
            smoke_test: false
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: archflow
            archive_ext: tar.gz
            smoke_test: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release tag format
        shell: bash
        run: |
          TAG="${{ steps.release_tag.outputs.value }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG (expected vX.Y.Z)" >&2
            exit 1
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross linker for aarch64-unknown-linux-gnu
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target "${{ matrix.target }}"

      - name: Smoke test
        if: matrix.smoke_test
        shell: bash
        run: |
          TARGET_ROOT="${CARGO_TARGET_DIR:-target}"
          if [[ "$TARGET_ROOT" = /* ]]; then
            BIN="${TARGET_ROOT}/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          else
            BIN="${GITHUB_WORKSPACE}/${TARGET_ROOT}/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          fi

          if [[ ! -f "$BIN" ]]; then
            echo "release binary not found: $BIN" >&2
            echo "target directory contents:" >&2
            find "$TARGET_ROOT" -maxdepth 4 -type f | head -200 >&2 || true
            exit 1
          fi

          chmod +x "$BIN"

          # Verify that the binary version matches the release tag
          TAG="${{ steps.release_tag.outputs.value }}"
          EXPECTED_VERSION="${TAG#v}"
          BINARY_VERSION="$("$BIN" --version | awk '{print $2}')"
          if [[ "$BINARY_VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "Binary version mismatch: binary reports '${BINARY_VERSION}' but release tag is '${TAG}'" >&2
            exit 1
          fi

          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT
          pushd "$TMP_DIR" >/dev/null
          "$BIN" init --preset generic-layered --project-name release-smoke
          "$BIN" plan
          "$BIN" audit
          popd >/dev/null

      - name: Skip smoke test for cross target
        if: ${{ !matrix.smoke_test }}
        run: echo "Skipping runtime smoke test for cross-compiled target ${{ matrix.target }}"

      - name: Package archive
        shell: bash
        run: |
          TAG="${{ steps.release_tag.outputs.value }}"
          TARGET_ROOT="${CARGO_TARGET_DIR:-target}"
          DIST_DIR="dist"
          mkdir -p "$DIST_DIR"
          ARCHIVE_NAME="archflow-${TAG}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          tar -czf "$DIST_DIR/$ARCHIVE_NAME" -C "${TARGET_ROOT}/${{ matrix.target }}/release" "${{ matrix.binary_name }}"

          (cd "$DIST_DIR" && sha256sum "$ARCHIVE_NAME" > "$ARCHIVE_NAME.sha256")

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: archflow-release-${{ matrix.target }}
          path: dist/*

  build-macos-arm64-primary:
    name: Build (aarch64-apple-darwin on macos-latest)
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release tag format
        shell: bash
        run: |
          TAG="${{ steps.release_tag.outputs.value }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG (expected vX.Y.Z)" >&2
            exit 1
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Skip smoke test for cross target
        run: echo "Skipping runtime smoke test for cross-compiled target aarch64-apple-darwin"

      - name: Package archive
        shell: bash
        run: |
          TAG="${{ steps.release_tag.outputs.value }}"
          TARGET_ROOT="${CARGO_TARGET_DIR:-target}"
          DIST_DIR="dist"
          mkdir -p "$DIST_DIR"
          ARCHIVE_NAME="archflow-${TAG}-aarch64-apple-darwin.tar.gz"
          tar -czf "$DIST_DIR/$ARCHIVE_NAME" -C "${TARGET_ROOT}/aarch64-apple-darwin/release" "archflow"

          (cd "$DIST_DIR" && sha256sum "$ARCHIVE_NAME" > "$ARCHIVE_NAME.sha256")

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: archflow-release-aarch64-apple-darwin
          path: dist/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
      - build-macos-arm64-primary
    if: needs.build.result == 'success' && needs.build-macos-arm64-primary.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p dist/release-assets
          find dist -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -exec cp {} dist/release-assets/ \;

      - name: Build combined checksums file
        shell: bash
        run: |
          pushd dist/release-assets >/dev/null
          cat *.sha256 > checksums.txt
          popd >/dev/null

      - name: Upload assets to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.value }}
          draft: true
          files: |
            dist/release-assets/*.tar.gz
            dist/release-assets/*.sha256
            dist/release-assets/checksums.txt

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release_tag.outputs.value }}"
          RELEASE_ID="$(gh api "repos/${{ github.repository }}/releases" --paginate --jq ".[] | select(.tag_name == \"${TAG}\") | .id" | head -1)"
          gh api \
            -X PATCH \
            "repos/${{ github.repository }}/releases/${RELEASE_ID}" \
            -f draft=false
          echo "Published release ${TAG} (id=${RELEASE_ID})"

name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'

sort-by: merged_at
sort-direction: descending
filter-by-commitish: true

no-changes-template: "- 変更なし"

exclude-labels:
  - "skip-changelog"

exclude-contributors:
  - "dependabot[bot]"
  - "renovate[bot]"

version-resolver:
  major:
    labels:
      - "major"
      - "breaking"
  minor:
    labels:
      - "minor"
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "patch"
      - "fix"
      - "bug"
      - "refactor"
      - "performance"
      - "security"
      - "docs"
      - "test"
      - "chore"
      - "ci"
      - "build"
      - "deps"
  default: patch

categories:
  - title: "🚀 Features"
    labels:
      - "feature"
      - "enhancement"

  - title: "🐛 Fixes"
    labels:
      - "fix"
      - "bug"

  - title: "♻️ Refactors"
    labels:
      - "refactor"

  - title: "⚡ Performance"
    labels:
      - "performance"

  - title: "🔒 Security"
    labels:
      - "security"

  - title: "🧪 Tests"
    labels:
      - "test"

  - title: "📝 Documentation"
    labels:
      - "docs"

  - title: "🔧 Maintenance"
    labels:
      - "chore"
      - "ci"
      - "build"
      - "deps"

autolabeler:
  - label: "docs"
    files:
      - "*.md"
      - "docs/**"
      - ".github/**"
    branch:
      - '/^docs\/.+/'
    title:
      - '/^docs(\(.+\))?:/i'

  - label: "ci"
    files:
      - ".github/workflows/**"
    branch:
      - '/^ci\/.+/'
    title:
      - '/^ci(\(.+\))?:/i'

  - label: "test"
    files:
      - "tests/**"
      - "**/*_test.rs"
      - "**/tests.rs"
    branch:
      - '/^test\/.+/'
    title:
      - '/^test(\(.+\))?:/i'

  - label: "feature"
    branch:
      - '/^feat(ure)?\/.+/'
    title:
      - '/^feat(\(.+\))?:/i'

  - label: "fix"
    branch:
      - '/^fix\/.+/'
    title:
      - '/^fix(\(.+\))?:/i'

  - label: "refactor"
    branch:
      - '/^refactor\/.+/'
    title:
      - '/^refactor(\(.+\))?:/i'

  - label: "performance"
    branch:
      - '/^perf\/.+/'
    title:
      - '/^perf(\(.+\))?:/i'

  - label: "security"
    title:
      - '/security|cve|vuln/i'

  - label: "deps"
    branch:
      - '/^deps\/.+/'
      - '/^dependabot\/.+/'
      - '/^renovate\/.+/'
    title:
      - '/deps|dependencies/i'

  - label: "major"
    title:
      - '/!:/'
    body:
      - '/BREAKING CHANGE/i'

template: |
  ## What's Changed

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
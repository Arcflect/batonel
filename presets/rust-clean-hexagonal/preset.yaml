name: rust-clean-hexagonal
summary: Rust clean/hexagonal starter preset for architecture-first projects
architecture_style: clean-hexagonal
ecosystem: rust
source_example: examples/rust-clean-hexagonal
includes:
  required:
    - project.baton.yaml
    - placement.rules.yaml
    - contracts.template.yaml
  optional:
    - artifacts.plan.yaml
    - policy.profile.yaml
    - guard.sidecar.yaml

package:
  version: 0.1.0
  visibility: public
  compatibility:
    min_batonel_version: 0.1.0
    max_batonel_version: 0.1.99
    project_schema_version: "1"
    policy_profile_version: 1

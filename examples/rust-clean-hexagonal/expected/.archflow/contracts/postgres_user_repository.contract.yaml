name: postgres_user_repository
module: user
role: repository_impl
path: crates/adapters/db/src/repositories/postgres_user_repository.rs

responsibilities:
  - "Implement an outbound repository port"
  - "Persist user data in PostgreSQL"
  - "Translate between persistence data and domain/application models"


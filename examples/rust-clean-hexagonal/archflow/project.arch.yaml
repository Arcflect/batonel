project:
  name: rust-clean-hexagonal-app
  architecture_style: clean-hexagonal
  language: rust

workspace:
  enabled: true
  members:
    - crates/domain
    - crates/application
    - crates/adapters/http
    - crates/adapters/db

modules:
  - name: user
    features:
      - create_user
      - user_entity
      - user_repository_port
      - create_user_handler
      - postgres_user_repository
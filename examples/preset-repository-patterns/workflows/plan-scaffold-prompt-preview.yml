name: Plan Scaffold Prompt Preview (Example)

on:
  workflow_dispatch:
    inputs:
      artifact:
        description: "Artifact name for prompt preview"
        required: true
        default: "create_user"
      mode:
        description: "Prompt output mode"
        required: true
        default: "compact"

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Batonel CLI (example)
        run: |
          BATONEL_VERSION="v0.1.0"
          BATONEL_TARGET="x86_64-unknown-linux-gnu"
          curl -fsSL -o batonel.tar.gz "https://github.com/Arcflect/batonel/releases/download/${BATONEL_VERSION}/batonel-${BATONEL_VERSION}-${BATONEL_TARGET}.tar.gz"
          curl -fsSL -o batonel.tar.gz.sha256 "https://github.com/Arcflect/batonel/releases/download/${BATONEL_VERSION}/batonel-${BATONEL_VERSION}-${BATONEL_TARGET}.tar.gz.sha256"
          sha256sum -c batonel.tar.gz.sha256
          tar -xzf batonel.tar.gz
          chmod +x batonel
          sudo mv batonel /usr/local/bin/batonel
          batonel --version

      - name: Run plan
        working-directory: batonel
        run: batonel plan

      - name: Run scaffold
        working-directory: batonel
        run: batonel scaffold

      - name: Generate prompt preview
        working-directory: batonel
        run: |
          batonel prompt "${{ github.event.inputs.artifact }}" --mode "${{ github.event.inputs.mode }}" > prompt-preview.md

      - name: Upload prompt preview
        uses: actions/upload-artifact@v7
        with:
          name: batonel-prompt-preview-${{ github.event.inputs.artifact }}
          path: batonel/prompt-preview.md

name: Plan Scaffold Prompt Preview (Example)

on:
  workflow_dispatch:
    inputs:
      artifact:
        description: "Artifact name for prompt preview"
        required: true
        default: "create_user"
      mode:
        description: "Prompt output mode"
        required: true
        default: "compact"

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Archflow CLI (example)
        run: |
          ARCHFLOW_VERSION="v0.1.0"
          ARCHFLOW_TARGET="x86_64-unknown-linux-gnu"
          curl -fsSL -o archflow.tar.gz "https://github.com/Arcflect/archflow/releases/download/${ARCHFLOW_VERSION}/archflow-${ARCHFLOW_VERSION}-${ARCHFLOW_TARGET}.tar.gz"
          curl -fsSL -o archflow.tar.gz.sha256 "https://github.com/Arcflect/archflow/releases/download/${ARCHFLOW_VERSION}/archflow-${ARCHFLOW_VERSION}-${ARCHFLOW_TARGET}.tar.gz.sha256"
          sha256sum -c archflow.tar.gz.sha256
          tar -xzf archflow.tar.gz
          chmod +x archflow
          sudo mv archflow /usr/local/bin/archflow
          archflow --version

      - name: Run plan
        working-directory: archflow
        run: archflow plan

      - name: Run scaffold
        working-directory: archflow
        run: archflow scaffold

      - name: Generate prompt preview
        working-directory: archflow
        run: |
          archflow prompt "${{ github.event.inputs.artifact }}" --mode "${{ github.event.inputs.mode }}" > prompt-preview.md

      - name: Upload prompt preview
        uses: actions/checkout@v7
        with:
          name: archflow-prompt-preview-${{ github.event.inputs.artifact }}
          path: archflow/prompt-preview.md
